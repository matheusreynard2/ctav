quarkus.application.name=ctav-api

# Empacota tudo em um unico jar executavel: target/api-0.0.1-SNAPSHOT-runner.jar
quarkus.package.jar.type=uber-jar

quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
# Usuario do banco: em dev/test usa "postgres"; em producao usa "appuser".
quarkus.datasource.username=user_app_ctav
%prod.quarkus.datasource.username=appuser
quarkus.datasource.password=@@m159753123R@@
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ctav_db

# Se já existia o schema antigo (pacientes / paciente_remedio), rode antes:
# sql/rename_legacy_paciente_para_acolhido_postgresql.sql
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# --- Quinoa: empacota e serve o frontend (frontend/) junto com a API ---------
# Em producao o proprio Quarkus serve o SPA e a API na mesma origem/porta,
# eliminando a necessidade de Nginx e de CORS.
quarkus.quinoa.ui-dir=frontend
quarkus.quinoa.build-dir=dist
quarkus.quinoa.enable-spa-routing=true
# Impede que o Quinoa trate rotas de backend como rotas de SPA e as encaminhe
# para o dev server (o que, em dev, causava travamento/loop nas chamadas /api).
# /api  -> endpoints da API (JAX-RS)   |   /q -> endpoints internos do Quarkus.
quarkus.quinoa.ignored-path-prefixes=/api,/q
# Em desenvolvimento o Quinoa fica desativado: use o Vite (npm run dev) normalmente.
%dev.quarkus.quinoa.enabled=false

quarkus.http.cors=true
# Origens liberadas para CORS. Em producao, defina a variavel de ambiente
# CORS_ORIGINS com a URL do frontend (ex.: http://SEU_IP_PUBLICO_EC2 ou https://seudominio.com.br).
# Pode-se informar varias origens separadas por virgula.
quarkus.http.cors.origins=${CORS_ORIGINS:/http://localhost:[0-9]+/,/http://127.0.0.1:[0-9]+/,http://52.67.92.226:[0-9]+/,www.sistemactav.com.br,https://www.sistemactav.com.br}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Location
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=PT1H

# ===== Autenticacao (JWT + cookie HttpOnly) =====
# Segredo de assinatura do JWT (HS256). EM PRODUCAO defina a variavel de
# ambiente JWT_SECRET com um valor aleatorio e longo (>= 32 caracteres).
app.auth.jwt.secret=${JWT_SECRET:dev-segredo-troque-em-producao-com-no-minimo-32-caracteres-aleatorios}
app.auth.jwt.expiration-hours=8
app.auth.cookie.name=access_token
# Secure=false em dev (http localhost); true em producao (https).
# Pode ser sobreposto pela variavel de ambiente COOKIE_SECURE (ex.: defina
# COOKIE_SECURE=false em prod caso a EC2 sirva apenas via HTTP, sem dominio/SSL).
app.auth.cookie.secure=${COOKIE_SECURE:false}
%prod.app.auth.cookie.secure=${COOKIE_SECURE:true}

# ===== Comum aos dois ambientes =====
# a cadeia padrão acha o arquivo local (dev) OU a Role na EC2 (prod) sozinha
quarkus.s3.aws.credentials.type=default
quarkus.http.limits.max-body-size=15M
# Nunca sobe LocalStack via Docker: usamos o S3 real da AWS em dev/prod e,
# nos testes, nao ha acesso a S3. Sem isso o Quarkus tenta iniciar um container
# LocalStack ao subir a aplicacao (inclusive nos testes) e falha sem Docker.
quarkus.s3.devservices.enabled=false

# Regiao da AWS usada pelos clientes construidos manualmente (S3Presigner e
# o LambdaClient de relatorios). Mantida igual ao S3 (sa-east-1).
app.aws.region=sa-east-1
# Nome (ou ARN) da funcao Lambda que gera os PDFs de relatorios.
# Sobreponha em producao com a variavel de ambiente RELATORIOS_LAMBDA.
app.relatorios.lambda.function-name=${RELATORIOS_LAMBDA:ctav-relatorios-pdf}

# ===== DESENVOLVIMENTO (sua máquina) =====
%dev.quarkus.s3.aws.region=sa-east-1
%dev.app.anexos.bucket=anexos-acolhidos-sistemactav-com-br
# Em dev local a credencial AWS costuma nao ter lambda:InvokeFunction; gera o PDF
# via Node (lambda/relatorios-pdf) em vez de chamar a Lambda na nuvem.
%dev.app.relatorios.local-node.enabled=true

# ===== PRODUÇÃO (EC2) =====
%prod.quarkus.s3.aws.region=sa-east-1
%prod.app.anexos.bucket=anexos-acolhidos-sistemactav-com-br

# ===== TESTES (mvn package) =====
%test.app.anexos.bucket=anexos-teste-local
%test.quarkus.s3.aws.region=sa-east-1